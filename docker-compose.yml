version: '3.8'

services:
  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: info-aggregator-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - info-network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: info-aggregator-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/database.sqlite
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend/data:/app/data
      - ./backend/src:/app/src
    depends_on:
      - db
    networks:
      - info-network

  # SQLite Database (via adminer for visualization, optional)
  # SQLite runs locally in the backend container
  
  # Optional: Database Admin UI
  adminer:
    image: adminer
    container_name: info-aggregator-db-admin
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=backend
    depends_on:
      - backend
    networks:
      - info-network

networks:
  info-network:
    driver: bridge

volumes:
  backend_data:
    driver: local
